services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: kids_zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kids_kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kids_api
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_BROKER: kafka:9092

  minio:
    image: minio/minio
    container_name: kids_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: kids_worker
    restart: always
    depends_on:
      - kafka
    environment:
      KAFKA_BROKER: kafka:9092
