name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - "cmd/**"
      - "internal/**"
      - "pkg/**"
      - "Dockerfile.api"
      - "go.mod"
      - "go.sum"

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: kids-utopia-api
  ECS_SERVICE: kids-utopia-api-service
  ECS_CLUSTER: kids-utopia-cluster
  ECS_TASK_DEFINITION: kids-utopia-api
  CONTAINER_NAME: kids-utopia-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate Image Tag
        id: vars
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          docker build \
            -f Dockerfile.api \
            -t $ECR_REPOSITORY:${{ steps.vars.outputs.IMAGE_TAG }} .

      - name: Tag Docker Image
        run: |
          docker tag \
            $ECR_REPOSITORY:${{ steps.vars.outputs.IMAGE_TAG }} \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ steps.vars.outputs.IMAGE_TAG }}

      - name: Push Docker Image
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ steps.vars.outputs.IMAGE_TAG }}

      - name: Download Task Definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_TASK_DEFINITION \
            --query taskDefinition \
            > task-definition.json

      - name: Render New Task Definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.IMAGE_TAG }}

      - name: Deploy ECS Task Definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
